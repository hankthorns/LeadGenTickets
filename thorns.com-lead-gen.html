<!DOCTYPE html>
<html>
<head>
    <title>Mailchimp Subscription Form</title>
</head>
<body>
    <h2>Subscribe to Our Newsletter</h2>
    <form action="https://<dc>.api.mailchimp.com/3.0/lists/<list-id>/members/" method="post">
        <input type="email" name="email_address" placeholder="Your email" required>
        <input type="submit" value="Subscribe">
    </form>
</body>
</html>
